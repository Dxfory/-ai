<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工笔花鸟白描与分染教学</title>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="panel">
          <div class="brand">
            <span class="mark">线</span>
            <div>
              <h1>工笔花鸟教学</h1>
              <p>上传原画，先得到白描，再进入分染教学示范。</p>
            </div>
          </div>

          <form id="uploadForm" class="control-group">
            <label class="label" for="referenceFile">原画</label>
            <input id="referenceFile" type="file" accept="image/*" required />
            <label class="label" for="notes">备注</label>
            <input id="notes" type="text" placeholder="例如：白花、叶片、花苞局部" />
            <button type="submit">上传原画</button>
          </form>

          <form id="draftForm" class="control-group" hidden>
            <label class="label" for="provider">白描生成方式</label>
            <select id="provider">
              <option value="source_locked_baimiao">精准提线白描</option>
              <option value="local_edge_preview">本地边缘预览</option>
              <option value="ai_baimiao">AI 白描实验</option>
            </select>
            <label class="label" for="lineStrength">线条强度 <span id="lineStrengthValue">5</span></label>
            <input id="lineStrength" type="range" min="1" max="5" value="5" />
            <label class="label" for="detailLevel">细节保留 <span id="detailLevelValue">1</span></label>
            <input id="detailLevel" type="range" min="1" max="5" value="1" />
            <label class="checkbox">
              <input id="preserveTexture" type="checkbox" checked />
              保留花瓣、叶脉或羽毛纹理
            </label>
            <button type="submit">生成白描</button>
          </form>

          <form id="lineDraftUploadForm" class="control-group" hidden>
            <label class="label" for="lineDraftFile">已有白描</label>
            <input id="lineDraftFile" type="file" accept="image/*" />
            <button type="submit" class="secondary-button">上传白描作为分染输入</button>
          </form>

          <div id="fenranControls" class="control-group" hidden>
            <label class="label" for="fenranGoal">分染教学目标</label>
            <input id="fenranGoal" type="text" value="先浅后深，保留纸白，按花瓣和叶片结构分染" />
            <button id="startFenranButton" type="button">开始分染</button>
          </div>

          <button id="createSessionButton" hidden>创建分步练习</button>
          <p id="status" class="status">等待上传原画。</p>
        </aside>

        <section class="stage">
          <div class="preview-grid">
            <figure>
              <figcaption>原画</figcaption>
              <img id="referencePreview" alt="" />
            </figure>
            <figure>
              <figcaption>白描</figcaption>
              <img id="draftPreview" alt="" />
              <a id="downloadDraft" class="download" href="#" download hidden>下载白描</a>
            </figure>
            <figure>
              <figcaption>分染教学图</figcaption>
              <img id="fenranPreview" alt="" />
              <a id="downloadFenran" class="download" href="#" download hidden>下载分染图</a>
            </figure>
          </div>

          <section id="practiceArea" class="practice" hidden>
            <div class="step-header">
              <div>
                <span id="stepMeta" class="eyebrow"></span>
                <h2 id="stepTitle"></h2>
              </div>
              <div class="step-actions">
                <button id="retryButton" type="button">我想再改一下</button>
                <button id="continueButton" type="button">继续下一步</button>
              </div>
            </div>

            <p id="stepInstruction" class="instruction"></p>
            <div class="lists">
              <div>
                <h3>自检</h3>
                <ul id="checklist"></ul>
              </div>
              <div>
                <h3>常见问题</h3>
                <ul id="mistakes"></ul>
              </div>
            </div>

            <form id="submissionForm" class="submission">
              <label class="label" for="submissionFile">上传本步作业</label>
              <input id="submissionFile" type="file" accept="image/*" required />
              <button type="submit">上传并生成叠图</button>
            </form>

            <div class="preview-grid">
              <figure>
                <figcaption>本步作业</figcaption>
                <img id="submissionPreview" alt="" />
              </figure>
              <figure>
                <figcaption>叠图对照</figcaption>
                <img id="overlayPreview" alt="" />
              </figure>
            </div>
          </section>
        </section>
      </section>
    </main>
    <script src="/app/app.js"></script>
  </body>
</html>
