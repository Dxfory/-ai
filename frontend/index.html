<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>原画转工笔白描</title>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="panel">
          <div class="brand">
            <span class="mark">线</span>
            <div>
              <h1>原画转工笔白描</h1>
              <p>上传原画，输出白底黑线白描稿。</p>
            </div>
          </div>

          <form id="uploadForm" class="control-group">
            <label class="label" for="referenceFile">原画图片</label>
            <input id="referenceFile" type="file" accept="image/*" required />
            <button type="submit">上传原画</button>
          </form>

          <form id="draftForm" class="control-group" hidden>
            <button type="submit">生成白描稿</button>
          </form>

          <p id="status" class="status">等待上传原画。</p>
        </aside>

        <section class="stage">
          <div class="preview-grid">
            <figure>
              <figcaption>原画</figcaption>
              <img id="referencePreview" alt="" />
            </figure>
            <figure>
              <figcaption>白描稿</figcaption>
              <img id="draftPreview" alt="" />
              <a id="downloadDraft" class="download" href="#" download hidden>下载白描稿</a>
            </figure>
          </div>
        </section>
      </section>
    </main>
    <script src="/app/app.js"></script>
  </body>
</html>
