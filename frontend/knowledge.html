<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工笔花鸟白描知识库</title>
    <link rel="stylesheet" href="/app/knowledge.css" />
  </head>
  <body>
    <main class="knowledge-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="mark">线</span>
          <div>
            <h1>工笔花鸟白描知识库</h1>
            <p>整书抽取结果，用来检查“原作已有勾线”的学习质量。</p>
          </div>
        </div>

        <div class="stats" id="stats"></div>

        <label class="field">
          <span>页面类型</span>
          <select id="typeFilter">
            <option value="all">全部</option>
          </select>
        </label>

        <label class="field">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="页码、图号、对象、线条规则" />
        </label>

        <nav class="tabs" aria-label="知识库视图">
          <button class="tab active" data-view="pages" type="button">页面</button>
          <button class="tab" data-view="lines" type="button">墨线规则</button>
          <button class="tab" data-view="techniques" type="button">技法</button>
          <button class="tab" data-view="constraints" type="button">约束</button>
        </nav>

        <a class="home-link" href="/app/">返回练习页</a>
      </aside>

      <section class="content">
        <header class="content-header">
          <div>
            <span class="eyebrow" id="bookId"></span>
            <h2 id="viewTitle">页面学习结果</h2>
          </div>
          <p id="viewSummary"></p>
        </header>

        <section id="list" class="list"></section>
      </section>
    </main>
    <script src="/app/knowledge.js"></script>
  </body>
</html>
